name: Android CI

on:
  push:
    branches: [main, master]
    paths:
      - 'android-app/**'
      - 'core-lib/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-ci.yml'

env:
  JAVA_VERSION: '17'

jobs:
  # ===== 编译 APK =====
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: android-app

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew 2>/dev/null || true

      - name: Generate Gradle wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version 8.5 2>/dev/null || true

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug 2>/dev/null || gradle assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-android-apk-debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ===== Lint 检查 =====
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: android-app

      - name: Run Lint
        working-directory: android-app
        run: ./gradlew lint 2>/dev/null || gradle lint

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-report
          path: android-app/app/build/reports/lint-results*.html
