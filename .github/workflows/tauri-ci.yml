name: Tauri CI

on:
  push:
    branches: [main, master]
    paths:
      - 'tauri-ui/**'
      - '.github/workflows/tauri-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'tauri-ui/**'
      - '.github/workflows/tauri-ci.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  # ===== Windows 编译 =====
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'tauri-ui/src-tauri'

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Install npm dependencies
        working-directory: tauri-ui
        run: npm ci

      - name: Build Tauri (MSI + NSIS)
        working-directory: tauri-ui
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v3
        with:
          name: shadowgate-windows-installer
          path: |
            tauri-ui/src-tauri/target/release/bundle/msi/*.msi
            tauri-ui/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ===== macOS 编译 (可选) =====
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    if: false  # 当前仅 Windows 端需要 Tauri UI
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'tauri-ui/src-tauri'

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Install npm dependencies
        working-directory: tauri-ui
        run: npm ci

      - name: Build Tauri (DMG)
        working-directory: tauri-ui
        run: npm run tauri build

      - uses: actions/upload-artifact@v3
        with:
          name: shadowgate-macos-dmg
          path: tauri-ui/src-tauri/target/release/bundle/dmg/*.dmg
