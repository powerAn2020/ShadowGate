name: Tauri CI

on:
  push:
    branches: [main, master]
    paths:
      - 'tauri-ui/**'
      - 'pc-daemon/**'
      - 'core-lib/**'
      - 'credential-provider/**'
      - 'config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/tauri-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'tauri-ui/**'
      - 'pc-daemon/**'
      - 'core-lib/**'
      - 'credential-provider/**'
      - 'config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/tauri-ci.yml'
  workflow_dispatch:

jobs:
  # ===== Windows 编译 =====
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'tauri-ui/src-tauri'

      - name: Install npm dependencies
        working-directory: tauri-ui
        run: npm ci

      - name: Build daemon sidecar
        run: cargo build --release -p shadowgate-pc-daemon

      - name: Prepare daemon sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tauri-ui/src-tauri/bin | Out-Null
          Copy-Item target/release/shadowgate-daemon.exe tauri-ui/src-tauri/bin/shadowgate-daemon-x86_64-pc-windows-msvc.exe

      - name: Build Credential Provider
        run: msbuild credential-provider/ShadowGateCredentialProvider.vcxproj /p:Configuration=Release /p:Platform=x64 /m

      - name: Build Tauri
        working-directory: tauri-ui
        run: npx tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-windows-installer
          path: |
            tauri-ui/src-tauri/target/release/bundle/msi/*.msi
            tauri-ui/src-tauri/target/release/bundle/nsis/*.exe
            credential-provider/x64/Release/ShadowGateCredentialProvider.dll
          retention-days: 30
