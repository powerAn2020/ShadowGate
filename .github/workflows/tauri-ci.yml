name: Tauri CI

on:
  push:
    branches: [main, master]
    paths:
      - 'tauri-ui/**'
      - '.github/workflows/tauri-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'tauri-ui/**'
      - '.github/workflows/tauri-ci.yml'
  workflow_dispatch:

jobs:
  # ===== Windows 编译 =====
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    continue-on-error: true  # Windows resource icon needs real .ico
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri-ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'tauri-ui/src-tauri'

      - name: Install npm dependencies
        working-directory: tauri-ui
        run: npm ci

      - name: Install Tauri CLI
        working-directory: tauri-ui
        run: npm install -D @tauri-apps/cli@latest

      - name: Build Tauri
        working-directory: tauri-ui
        run: npx tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-windows-installer
          path: |
            tauri-ui/src-tauri/target/release/bundle/msi/*.msi
            tauri-ui/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
