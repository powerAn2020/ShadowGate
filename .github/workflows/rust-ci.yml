name: Rust CI

on:
  push:
    branches: [main, master]
    paths:
      - 'core-lib/**'
      - 'pc-daemon/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'config/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'core-lib/**'
      - 'pc-daemon/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===== 代码检查 =====
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system deps (dbus for btleplug)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude shadowgate-ui --all-targets -- -D warnings

  # ===== 测试 (Linux + Windows) =====
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude shadowgate-ui

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude shadowgate-ui

  # ===== 编译 (Release) =====
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: [clippy, test-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev
      - run: cargo build --release --workspace --exclude shadowgate-ui
      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-linux-x86_64
          path: |
            target/release/shadowgate-daemon
            target/release/libshadowgate_core.so
            target/release/libshadowgate_core.rlib

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [test-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace --exclude shadowgate-ui
      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-windows-x86_64
          path: |
            target/release/shadowgate-daemon.exe
            target/release/shadowgate_core.dll
            target/release/shadowgate_core.dll.lib

  # ===== Android 交叉编译 =====
  build-android:
    name: Build (Android .so)
    runs-on: ubuntu-latest
    needs: [clippy, test-linux]
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build .so (core-lib only, no system deps)
        run: cargo build --release -p shadowgate-core --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-android-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libshadowgate_core.so
