name: Rust CI

on:
  push:
    branches: [main, master]
    paths:
      - 'core-lib/**'
      - 'pc-daemon/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'config/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'core-lib/**'
      - 'pc-daemon/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===== 代码格式检查 =====
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ===== Clippy — core-lib only (pc-daemon requires Windows) =====
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p shadowgate-core --all-targets -- -D warnings

  # ===== 测试 — core-lib =====
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p shadowgate-core

  # ===== 编译 core-lib =====
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: [clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p shadowgate-core
      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-linux-x86_64
          path: |
            target/release/libshadowgate_core.so
            target/release/libshadowgate_core.rlib

  # ===== Android 交叉编译 =====
  build-android:
    name: Build (Android .so)
    runs-on: ubuntu-latest
    needs: [clippy, test]
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build .so
        run: cargo build --release -p shadowgate-core --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: shadowgate-android-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libshadowgate_core.so
