<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowGate - BLE Proximity Lock</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1"/>
        </svg>
        <h1>ShadowGate</h1>
      </div>
      <div class="header-actions">
        <select id="themeSelect" class="theme-select" aria-label="Theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <span id="uptime" class="uptime">--</span>
      </div>
    </header>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <div class="status-indicator" id="statusIndicator">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">IDLE</span>
      </div>
      <div class="rssi-gauge" id="rssiGauge">
        <div class="gauge-label">Signal (RSSI)</div>
        <div class="gauge-value" id="rssiValue">-- dBm</div>
        <div class="gauge-bar">
          <div class="gauge-fill" id="rssiFill" style="width: 0%"></div>
        </div>
      </div>
      <div class="device-name" id="deviceName">No device connected</div>
      <div class="status-grid">
        <div>
          <span class="metric-label">Trusted</span>
          <strong id="trustedCount">0</strong>
        </div>
        <div>
          <span class="metric-label">Credential</span>
          <strong id="credentialState">--</strong>
        </div>
      </div>
    </div>

    <!-- Action Button -->
    <button class="btn-primary" id="toggleBtn">
      <span class="btn-icon">&#9654;</span>
      <span>Start Daemon</span>
    </button>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="devices">Devices</button>
      <button class="tab" data-tab="config">Config</button>
      <button class="tab" data-tab="logs">Logs</button>
    </nav>

    <!-- Tab Content -->
    <div class="tab-content">
      <!-- Devices Tab -->
      <section class="tab-panel active" id="panel-devices">
        <div class="pairing-box">
          <div class="pairing-head">
            <span>PC Pairing Payload</span>
            <button class="btn-text" id="beginPairingBtn">Generate</button>
          </div>
          <textarea id="pairingPayload" readonly placeholder="Generate a pairing payload, then scan or copy it on Android."></textarea>
        </div>
        <div class="device-list" id="deviceList">
          <div class="empty-state">
            <p>No trusted devices</p>
            <p class="sub">Scan a QR code from your Android device to pair</p>
          </div>
        </div>
        <button class="btn-secondary" id="finishPairingBtn">
          <span class="btn-icon">+</span> Finish Pairing
        </button>
      </section>

      <!-- Config Tab -->
      <section class="tab-panel" id="panel-config">
        <div class="config-group">
          <label class="config-label">
            Service UUID
            <span class="config-value">BLE</span>
          </label>
          <input type="text" class="config-input" id="cfgServiceUuid" />
        </div>
        <div class="config-group">
          <label class="config-label">
            Unlock Threshold (dBm)
            <span class="config-value" id="cfgUnlockVal">-60</span>
          </label>
          <input type="range" class="config-slider" id="cfgUnlock" min="-90" max="-30" value="-60" step="1" />
        </div>
        <div class="config-group">
          <label class="config-label">
            Lock Threshold (dBm)
            <span class="config-value" id="cfgLockVal">-80</span>
          </label>
          <input type="range" class="config-slider" id="cfgLock" min="-100" max="-40" value="-80" step="1" />
        </div>
        <div class="config-group">
          <label class="config-label">
            Scan Interval (ms)
            <span class="config-value" id="cfgScanVal">1000</span>
          </label>
          <input type="range" class="config-slider" id="cfgScan" min="200" max="5000" value="1000" step="100" />
        </div>
        <div class="config-group">
          <label class="config-label">
            Challenge Timeout (ms)
            <span class="config-value" id="cfgTimeoutVal">1500</span>
          </label>
          <input type="range" class="config-slider" id="cfgTimeout" min="500" max="5000" value="1500" step="100" />
        </div>
        <div class="config-group">
          <label class="config-label">
            Lock Confirmation (ms)
            <span class="config-value" id="cfgConfirmVal">5000</span>
          </label>
          <input type="range" class="config-slider" id="cfgConfirm" min="1000" max="15000" value="5000" step="500" />
        </div>
        <button class="btn-secondary" id="saveConfigBtn">Save Configuration</button>
        <div class="credential-box">
          <div class="credential-head">
            <span>Credential Provider</span>
            <strong id="windowsCredentialState">Checking</strong>
          </div>
          <input type="text" class="config-input" id="credDomain" autocomplete="organization" placeholder="Domain (optional)" />
          <input type="text" class="config-input" id="credUsername" autocomplete="username" placeholder="Windows username" />
          <input type="password" class="config-input" id="credPassword" autocomplete="current-password" placeholder="Windows password" />
          <button class="btn-secondary" id="saveWindowsCredentialBtn">Save Windows Credential</button>
        </div>
      </section>

      <!-- Logs Tab -->
      <section class="tab-panel" id="panel-logs">
        <div class="log-viewer" id="logViewer">
          <div class="log-entry">[--:--:--] Waiting for daemon...</div>
        </div>
        <button class="btn-text" id="refreshLogsBtn">Refresh</button>
      </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>ShadowGate v0.1.0</span>
      <span class="footer-dot"></span>
      <span>Nous Research</span>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
